name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache TypeScript build — api-client-react
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-api-client-react-${{ hashFiles('lib/api-client-react/src/**', 'lib/api-client-react/tsconfig.json', 'tsconfig.base.json', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-api-client-react-

      - name: Cache TypeScript build — api-zod
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/dist
            lib/api-zod/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-api-zod-${{ hashFiles('lib/api-zod/src/**', 'lib/api-zod/tsconfig.json', 'tsconfig.base.json', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-api-zod-

      - name: Cache TypeScript build — db
        uses: actions/cache@v4
        with:
          path: |
            lib/db/dist
            lib/db/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-db-${{ hashFiles('lib/db/src/**', 'lib/db/tsconfig.json', 'tsconfig.base.json', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-db-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

  build-and-deploy:
    name: Build & Deploy
    needs: typecheck-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache TypeScript build — api-client-react
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-api-client-react-${{ hashFiles('lib/api-client-react/src/**', 'lib/api-client-react/tsconfig.json', 'tsconfig.base.json', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-api-client-react-

      - name: Cache TypeScript build — api-zod
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/dist
            lib/api-zod/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-api-zod-${{ hashFiles('lib/api-zod/src/**', 'lib/api-zod/tsconfig.json', 'tsconfig.base.json', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-api-zod-

      - name: Cache TypeScript build — db
        uses: actions/cache@v4
        with:
          path: |
            lib/db/dist
            lib/db/*.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-db-${{ hashFiles('lib/db/src/**', 'lib/db/tsconfig.json', 'tsconfig.base.json', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-db-

      - name: Cache Vite build cache
        uses: actions/cache@v4
        with:
          path: |
            artifacts/muted-science/.cache/vite
          key: ${{ runner.os }}-vite-${{ hashFiles('artifacts/muted-science/src/**', 'artifacts/muted-science/index.html', 'artifacts/muted-science/vite.config.ts', 'artifacts/muted-science/package.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build muted-science
        run: pnpm --filter @workspace/muted-science run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/muted-science/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg repo_url "${{ github.server_url }}/${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg commit_url "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg msg "${{ github.event.head_commit.message }}" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              text: ":x: *Deployment failed* for <\($repo_url)|\($repo)>",
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: (":x: *Deployment failed*\n*Repo:* <\($repo_url)|\($repo)>\n*Branch:* `\($branch)`\n*Commit:* <\($commit_url)|`\($commit)`> — \($msg)\n*Triggered by:* \($actor)\n\n<\($run_url)|View failed run →>")
                }
              }]
            }')
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
