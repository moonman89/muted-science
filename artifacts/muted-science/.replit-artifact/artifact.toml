kind = "web"
previewPath = "/"
title = "Muted Science"
version = "1.0.0"
id = "artifacts/muted-science"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18185

[services.development]
run = "pnpm --filter @workspace/muted-science run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/muted-science", "run", "build" ]
publicDir = "artifacts/muted-science/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18185"
BASE_PATH = "/"
